<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Obscura — Cryptographer's Terminal</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<meta name="description" content="Zero-knowledge ephemeral file transfer. Files encrypted in your browser with AES-256-GCM. Keys never reach the server." />
<meta name="theme-color" content="#08090c" />
<meta property="og:title" content="OBSCURA — zero-knowledge file transfer" />
<meta property="og:description" content="Files encrypted in your browser. The server never sees your keys." />
<meta property="og:type" content="website" />
<meta property="og:image" content="/favicon.svg" />
<meta name="twitter:card" content="summary" />
<link rel="icon" type="image/svg+xml" href="/favicon.svg" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  html, body { margin: 0; padding: 0; min-height: 100%; background: #08090c; font-family: "JetBrains Mono", monospace; }
  #root { width: 100%; min-height: 100vh; }
  *::-webkit-scrollbar { width: 8px; height: 8px; }
  *::-webkit-scrollbar-thumb { background: #2a2f3d; border-radius: 4px; }
  :root { --mono: "JetBrains Mono", "Fira Code", monospace; }
  @keyframes obs-pulse {
    0% { box-shadow: 0 0 0 0 currentColor; }
    70% { box-shadow: 0 0 0 6px transparent; }
    100% { box-shadow: 0 0 0 0 transparent; }
  }
  @keyframes obs-march {
    from { background-position: 0 0; }
    to { background-position: 40px 0; }
  }
</style>
</head>
<body>
<main id="root"></main>

<script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js" integrity="sha384-DGyLxAyjq0f9SPpVevD6IgztCFlnMF6oW/XQGmfe+IsZ8TqEiDrcHkMLKI6fiB/Z" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js" integrity="sha384-gTGxhz21lVGYNMcdJOyq01Edg0jhn/c22nsx0kyqP0TxaV5WVdsSH1fSDUf5YJj1" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/argon2-browser@1.18.0/dist/argon2-bundled.min.js" integrity="sha384-XOR3aNvHciLPIf6r+2glkrmbBbLmIJ1EChMXjw8eBKBf8gE0rDq1TyUNuRdorOqi" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.min.js" integrity="sha384-lQXOAyZwHXE55JFyrOMB7nY2Wv+m5ZWNtJcHrd1rceRQXAYNLak8ukN5TjBTcIwz" crossorigin="anonymous"></script>

<script src="/app.js"></script>
</body>
</html>
