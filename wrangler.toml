name = "obscura"
main = "worker/index.js"
compatibility_date = "2026-05-01"

# Custom domain. Cert + routing managed by Cloudflare; declaring it here
# means future deploys reassert the binding instead of relying on dashboard
# state that isn't tracked in the repo.
routes = [
  { pattern = "obscr.app", custom_domain = true },
  { pattern = "www.obscr.app", custom_domain = true },
  { pattern = "status.obscr.app", custom_domain = true },
]

# Serve Obscura.html (and other static assets) from the project root.
# `.assetsignore` excludes worker/, wrangler.toml, .git/, etc.
# Default not_found behavior falls through to the Worker, which rewrites
# `/` → `/Obscura.html` and handles `/api/*`.
[assets]
directory = "."
binding = "ASSETS"

# Ciphertext blobs. Server never sees plaintext or keys.
[[r2_buckets]]
binding = "BLOBS"
bucket_name = "obscura-blobs"
preview_bucket_name = "obscura-blobs-dev"

# Per-blob metadata: expiresAt, downloadsRemaining, size.
[[kv_namespaces]]
binding = "META"
id = "e3f6e5d9d51b4c05840f7a04636bac60"          # obscura-meta
preview_id = "4601f6aae329423db060f8238b9e284d"  # obscura-meta-preview

# Hourly sweep for orphaned R2 objects whose KV metadata expired.
# KV's own expirationTtl handles metadata cleanup; this handler is a safety net.
[triggers]
crons = ["0 * * * *"]

[vars]
MAX_BLOB_BYTES = "67108864"  # 64 MiB hard ceiling; design max is 50 MB
MAX_TTL_HOURS = "168"        # 7 days
MAX_DOWNLOADS = "100"
